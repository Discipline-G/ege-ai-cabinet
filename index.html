<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metascore | Кабинет</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, system-ui; background-color: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #000); padding: 20px; }
        .card { background: var(--tg-theme-secondary-bg-color, #f0f0f0); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        h1 { font-size: 24px; margin: 0 0 10px 0; }
        .value { font-size: 32px; font-weight: bold; color: #007bff; }
        .streak { color: #ff9800; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Баланс</h1>
        <div class="value" id="balanceDisplay">Загрузка...</div>
        <p>Академических рублей</p>
    </div>

    <div class="card">
        <h1>Серия побед <span class="streak">🔥</span></h1>
        <div class="value streak" id="streakDisplay">...</div>
        <p>Дней подряд</p>
    </div>

    <script>
        // 1. Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Открываем на весь экран

        // 2. Достаем chat_id пользователя (безопасно, выдается самим Telegram)
        const user = tg.initDataUnsafe?.user;
        const chatId = user ? user.id : null;

        // ЗАМЕНИТЬ НА ТВОЙ URL ВЕБХУКА ИЗ n8n (Production URL)
        const N8N_WEBHOOK_URL = 'https://45.131.183.101.nip.io/webhook/get-user-data';

        async function fetchUserData() {
            if (!chatId) {
                document.getElementById('balanceDisplay').innerText = "Ошибка авторизации";
                return;
            }

            try {
                // 3. Делаем запрос к твоему API
                const response = await fetch(`${N8N_WEBHOOK_URL}?chat_id=${chatId}`);
                const data = await response.json();

                // 4. Отрисовываем данные
                document.getElementById('balanceDisplay').innerText = data.balance ?? 0;
                document.getElementById('streakDisplay').innerText = data.streak_count ?? 0;
            } catch (error) {
                document.getElementById('balanceDisplay').innerText = "Ошибка сервера";
                console.error(error);
            }
        }

        // Запускаем сборку данных
        fetchUserData();
    </script>
</body>
</html>
