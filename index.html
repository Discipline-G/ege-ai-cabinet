<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ПРОВЕРЯЙ: Кабинет Ученика</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background-color: var(--tg-theme-bg-color, #f3f4f6); 
            color: var(--tg-theme-text-color, #111827); 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
        }
        .card { 
            background-color: var(--tg-theme-secondary-bg-color, #ffffff); 
            border: 1px solid var(--tg-theme-hint-color, #e5e7eb); 
        }
        .btn-primary { 
            background-color: var(--tg-theme-button-color, #3b82f6); 
            color: var(--tg-theme-button-text-color, #ffffff); 
        }
    </style>
</head>
<body class="p-4 antialiased">
    
    <div id="loader" class="flex justify-center items-center h-screen">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
    </div>

    <div id="app" class="max-w-md mx-auto space-y-6 hidden pb-10">
        
        <div class="flex justify-between items-center mt-2">
            <h1 class="text-2xl font-bold tracking-tight">Мой кабинет</h1>
            <div class="text-xs px-3 py-1 rounded-full bg-blue-100 text-blue-800 border border-blue-200 font-medium">
                Ученик
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="card rounded-xl p-4 text-center shadow-sm">
                <p class="text-[10px] sm:text-xs text-gray-500 mb-1 uppercase tracking-wide">Осталось проверок</p>
                <p class="text-3xl font-bold text-blue-600" id="val-balance">-</p>
            </div>
            <div class="card rounded-xl p-4 text-center shadow-sm">
                <p class="text-[10px] sm:text-xs text-gray-500 mb-1 uppercase tracking-wide">Сдано работ</p>
                <p class="text-3xl font-bold" id="val-works">-</p>
            </div>
        </div>

        <div class="card rounded-xl shadow-sm overflow-hidden">
            <div class="p-3 border-b border-gray-100 bg-opacity-50" style="background-color: var(--tg-theme-bg-color)">
                <h2 class="text-sm font-semibold">История проверок</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <tbody id="history-list" class="divide-y" style="border-color: var(--tg-theme-hint-color)">
                        </tbody>
                </table>
            </div>
        </div>

        <button onclick="getRefBonus()" class="btn-primary w-full py-3.5 rounded-xl font-semibold shadow-md transition active:scale-95 flex justify-center items-center">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12zm-7 4h14M5 12a2 2 0 110-4h14a2 2 0 110 4M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7"></path></svg>
            Получить бесплатные проверки
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 
        tg.ready();

        const chatId = tg.initDataUnsafe?.user?.id || 123456789;
        
        // URL к n8n (очищенный от пробелов для безопасности iOS)
        const WEBHOOK_URL = `https://45.131.183.101.sslip.io/webhook/get-user-data?chat_id=${chatId}`.trim();

        async function loadDashboard() {
            try {
                const res = await fetch(WEBHOOK_URL);
                if (!res.ok) throw new Error('Сбой сети');
                const data = await res.json();
                
                document.getElementById('loader').style.display = 'none';
                document.getElementById('app').style.display = 'block';

                // Заполняем дашборд
                document.getElementById('val-balance').innerText = data.balance || 0;
                const history = data.history || [];
                document.getElementById('val-works').innerText = history.length;

                // Заполняем историю
                const list = document.getElementById('history-list');
                if (history.length > 0) {
                    list.innerHTML = '';
                    history.forEach(item => {
                        const safeDate = item.date ? item.date.toString() : 'Недавно';
                        list.innerHTML += `
                            <tr class="hover:bg-gray-50 transition-colors">
                                <td class="p-3 text-gray-500 text-xs flex items-center">
                                    <svg class="w-4 h-4 mr-1 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                    ${safeDate}
                                </td>
                                <td class="p-3 text-right font-bold text-gray-800">${item.score} баллов</td>
                            </tr>`;
                    });
                } else {
                    list.innerHTML = '<tr><td colspan="2" class="p-4 text-center text-gray-500 text-xs">Вы еще не отправляли работы на проверку.</td></tr>';
                }
            } catch (e) {
                document.getElementById('loader').style.display = 'none';
                tg.showAlert(`Ошибка связи с сервером. Попробуйте позже.`);
            }
        }

        // Вызов подсказки для рефералки
        function getRefBonus() {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            tg.showAlert(`Чтобы получить бонусные проверки, отправьте боту команду /invite или выберите "🎁 Бонус" в меню!`);
        }

        window.onload = loadDashboard;
    </script>
</body>
</html>
