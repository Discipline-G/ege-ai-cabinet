<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ПРОВЕРЯЙ: Кабинет</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; padding-bottom: 30px; }
        .card { background-color: #ffffff; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); padding: 20px; margin-bottom: 15px; }
        
        /* Модальное окно тарифов */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 50; backdrop-filter: blur(2px); }
        #tariffs-modal { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; border-radius: 20px 20px 0 0; z-index: 100; padding: 25px 20px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); transform: translateY(100%); transition: transform 0.3s ease-out; max-height: 85vh; overflow-y: auto;}
        #tariffs-modal.open { transform: translateY(0); display: block; }
        
        .tariff-card { border: 2px solid #e5e7eb; border-radius: 12px; padding: 15px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; }
        .tariff-card.active { border-color: #3b82f6; background-color: #eff6ff; }
    </style>
</head>
<body class="p-4">

    <div id="loader" class="flex justify-center items-center h-screen">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
    </div>

    <div id="app" class="max-w-md mx-auto hidden">
        
        <div class="flex justify-between gap-3 mb-4">
            <div class="card flex-1 mb-0 flex flex-col justify-center items-center">
                <span class="text-xs text-gray-500 font-bold uppercase tracking-wider">Баланс</span>
                <div class="text-3xl font-black text-blue-500 my-1" id="val-balance">-</div>
                <span class="text-xs text-gray-400">проверок</span>
            </div>
            
            <div class="card flex-1 mb-0 flex flex-col justify-center items-center">
                <span class="text-xs text-gray-500 font-bold uppercase tracking-wider">Серия</span>
                <div class="text-4xl my-1">🔥</div>
                <div class="text-xl font-bold text-orange-500" id="val-streak">-</div>
                <span class="text-xs text-gray-400">дней подряд</span>
            </div>
        </div>

        <div class="space-y-3 mb-4">
            <button onclick="openTariffs()" class="w-full bg-blue-500 text-white font-bold py-3.5 rounded-xl active:bg-blue-600 transition shadow-md text-[15px]">
                Пополнить баланс
            </button>
            <div class="flex gap-3">
                <button onclick="tg.showAlert('Напишите /support боту для связи с поддержкой')" class="flex-1 bg-white border border-gray-200 text-blue-500 font-semibold py-2.5 rounded-xl active:bg-gray-50 transition text-sm">
                    Поддержка
                </button>
                <button onclick="tg.showAlert('FAQ:\n1 токен = 1 проверка сочинения.\nСрок проверки ~15 секунд.')" class="flex-1 bg-white border border-gray-200 text-blue-500 font-semibold py-2.5 rounded-xl active:bg-gray-50 transition text-sm">
                    FAQ
                </button>
            </div>
        </div>

        <div class="card">
            <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-4">Динамика баллов</h2>
            <div class="h-48 w-full">
                <canvas id="trendChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-4">Компетенции</h2>
            <div class="h-48 w-full">
                <canvas id="radarChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-4">Последние работы</h2>
            <div id="history-list" class="divide-y divide-gray-100">
                </div>
        </div>
    </div>

    <div id="modal-overlay" onclick="closeTariffs()"></div>
    <div id="tariffs-modal">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold">Выберите пакет</h2>
            <button onclick="closeTariffs()" class="text-gray-400 p-2 text-2xl leading-none">&times;</button>
        </div>
        
        <div class="tariff-card active" onclick="selectTariff(this, '5 проверок')">
            <div class="flex justify-between items-center">
                <div>
                    <div class="font-bold text-lg text-gray-800">5 проверок</div>
                    <div class="text-sm text-green-600 font-medium">Для старта</div>
                </div>
                <div class="text-xl font-black">190 ₽</div>
            </div>
        </div>

        <div class="tariff-card" onclick="selectTariff(this, '15 проверок')">
            <div class="flex justify-between items-center">
                <div>
                    <div class="font-bold text-lg text-gray-800">15 проверок</div>
                    <div class="text-sm text-orange-500 font-medium text-xs bg-orange-100 px-2 py-0.5 rounded mt-1 inline-block">Хит продаж</div>
                </div>
                <div class="text-xl font-black">450 ₽</div>
            </div>
        </div>

        <div class="tariff-card" onclick="selectTariff(this, 'Безлимит (Месяц)')">
            <div class="flex justify-between items-center">
                <div>
                    <div class="font-bold text-lg text-gray-800">Безлимит</div>
                    <div class="text-sm text-purple-600 font-medium">На 30 дней</div>
                </div>
                <div class="text-xl font-black">990 ₽</div>
            </div>
        </div>

        <button onclick="buyTariff()" class="w-full bg-blue-500 text-white font-bold py-3.5 rounded-xl mt-4 active:bg-blue-600 shadow-md">
            Оплатить
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 
        
        const chatId = tg.initDataUnsafe?.user?.id || '123456789';
        const WEBHOOK_URL = `https://45.131.183.101.sslip.io/webhook/get-user-data?chat_id=${chatId}`.trim();

        let selectedPackage = '5 проверок';

        async function loadDashboard() {
            try {
                const res = await fetch(WEBHOOK_URL);
                if (!res.ok) throw new Error('Network error');
                const data = await res.json();
                
                document.getElementById('loader').style.display = 'none';
                document.getElementById('app').style.display = 'block';

                // Заполнение текста
                document.getElementById('val-balance').innerText = data.balance !== undefined ? data.balance : 0;
                document.getElementById('val-streak').innerText = data.streak_count || 1;

                // История
                const historyList = document.getElementById('history-list');
                if (data.history && data.history.length > 0) {
                    historyList.innerHTML = '';
                    data.history.forEach(item => {
                        const safeDate = item.date ? item.date.toString() : 'Недавно';
                        historyList.innerHTML += `
                            <div class="flex justify-between items-center py-3">
                                <span class="text-gray-500 text-sm">${safeDate}</span>
                                <span class="font-bold text-gray-800 text-lg">${item.score}/22</span>
                            </div>`;
                    });
                } else {
                    historyList.innerHTML = '<div class="text-center text-gray-400 py-4 text-sm">Работ пока нет</div>';
                }

                // Рендер Графиков (используем реальные данные или мок-данные для красоты, если пусто)
                const trendData = (data.trend_scores && data.trend_scores.length > 0) ? data.trend_scores : [10, 14, 12, 18, 20];
                const radarData = (data.radar_scores && data.radar_scores.length > 0) ? data.radar_scores : [85, 88, 90, 100, 100, 100];
                
                renderTrendChart(trendData);
                renderRadarChart(radarData);

            } catch (e) {
                document.getElementById('loader').style.display = 'none';
                tg.showAlert(`Ошибка связи: ${e.message}`);
            }
        }

        // График Линии (Динамика)
        function renderTrendChart(scores) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            const labels = scores.map((_, i) => `#${i + 1}`);
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Баллы',
                        data: scores,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        borderWidth: 3,
                        pointBackgroundColor: '#3b82f6',
                        pointRadius: 4,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, max: 22, grid: { color: '#f3f4f6' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        // График Бары (Компетенции)
        function renderRadarChart(scores) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Орфограф.', 'Пунктуац.', 'Граммат.', 'Речь', 'Логика', 'Факты'],
                    datasets: [{
                        data: scores,
                        backgroundColor: '#f97316',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, max: 100, grid: { color: '#f3f4f6' } },
                        x: { grid: { display: false }, ticks: { font: { size: 10 } } }
                    }
                }
            });
        }

        // Логика Модального окна Тарифов
        function openTariffs() {
            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('tariffs-modal').classList.add('open');
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function closeTariffs() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('tariffs-modal').classList.remove('open');
        }

        function selectTariff(element, name) {
            document.querySelectorAll('.tariff-card').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            selectedPackage = name;
            if (tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
        }

        function buyTariff() {
            closeTariffs();
            // Отправляем данные обратно в бота для генерации инвойса (позже прикрутишь экшен в n8n)
            tg.sendData(JSON.stringify({ action: 'buy', package: selectedPackage }));
            tg.close();
        }

        window.onload = loadDashboard;
    </script>
</body>
</html>
