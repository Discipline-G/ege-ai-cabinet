<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Metascore | Personal</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #121212; color: #e1e8ed; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 400px; margin: 40px auto 0; padding: 20px; background: #1a1a1a; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); border: 1px solid #333; }
        h1 { font-size: 18px; color: #fff; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .metascore-brand { font-size: 10px; color: #666; margin-bottom: 30px; }
        .bal-val { font-size: 48px; font-weight: bold; color: #e1e8ed; }
        .bal-val span { font-size: 24px; color: #666; font-weight: normal; }
        .status { font-size: 14px; color: #f1c40f; margin-bottom: 40px; }
        .btn { display: block; width: 100%; padding: 15px; background: #e1e8ed; color: #121212; border-radius: 12px; font-weight: bold; text-decoration: none; font-size: 16px; margin-bottom: 10px; }
        .info { font-size: 12px; color: #555; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Metascore Personal</h1>
        <div class="metascore-brand">STANDARD-27 AUDIT PROTOCOL</div>
        <div id="loader">Синхронизация...</div>
        <div id="content" style="display:none;">
            <div class="bal-val" id="balance">--</div>
            <div class="status">Академические ₽</div>
            <a href="https://t.me/DisciplineLover" class="btn">💳 Пополнить</a>
        </div>
        <div class="info" id="user-info">ID: ...</div>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const userId = tg.initDataUnsafe.user.id;
        document.getElementById('user-info').innerText = "Ваш ID: " + userId;

        // ИСПРАВЛЕННАЯ ПЕРЕМЕННАЯ
        const N8N_URL_GET_BALANCE = 'https://n8n55555.hostkey.in/webhook/get-balance'; 

        fetch(`${N8N_URL_GET_BALANCE}?id=${userId}`)
            .then(response => response.json())
            .then(data => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                document.getElementById('balance').innerText = data.balance;
            })
            .catch(error => {
                document.getElementById('loader').innerText = "Ошибка синхронизации. Попробуйте позже.";
            });
    </script>
</body>
</html>
