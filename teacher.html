<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПРОВЕРЯЙ | Дашборд Учителя</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* Стилизация скроллбара для истории работ */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-4 pb-12">

<div class="max-w-3xl mx-auto">
    <header class="flex justify-between items-center bg-gray-800 p-4 rounded-xl border border-gray-700 mb-6 shadow-lg">
        <div class="text-xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-teal-400">
            ПРОВЕРЯЙ
        </div>
        <button id="copy-btn" onclick="copyCode()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-colors shadow-md">
            Код: Загрузка...
        </button>
    </header>

    <div id="loader" class="text-center py-10 text-gray-400 font-medium animate-pulse">
        Синхронизация с ИИ-сервером...
    </div>
    
    <div id="dashboard-content" class="hidden">
        
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 text-center shadow-md">
                <div class="text-xs text-gray-400 uppercase tracking-wider font-bold mb-1">Проверено работ</div>
                <div class="text-3xl font-black text-white" id="stat-total">0</div>
            </div>
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 text-center shadow-md">
                <div class="text-xs text-gray-400 uppercase tracking-wider font-bold mb-1">Учеников</div>
                <div class="text-3xl font-black text-white" id="stat-students">0</div>
            </div>
            <div class="bg-gray-800 p-4 rounded-xl border border-blue-500/30 text-center shadow-md col-span-2 relative overflow-hidden">
                <div class="absolute inset-0 bg-blue-500/5"></div>
                <div class="text-xs text-blue-400 uppercase tracking-wider font-bold mb-1 relative z-10">Средний балл класса</div>
                <div class="text-4xl font-black text-white relative z-10" id="stat-avg">0.0</div>
            </div>
        </div>

        <div class="mb-6">
            <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3 flex items-center gap-2">
                🔥 Слабые зоны класса
            </h2>
            <div id="class-heatmap" class="grid grid-cols-3 gap-3">
                </div>
        </div>

        <div>
            <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3">👨‍🎓 Детализация</h2>
            <div id="students-list" class="space-y-3">
                </div>
        </div>
        
    </div>

    <div id="last-update" class="text-center text-xs text-gray-500 mt-8"></div>
</div>

<script>
    // 1. Инициализация Telegram
    const tg = window.Telegram.WebApp;
    tg.expand();
    const teacherId = tg.initDataUnsafe?.user?.id || 'TEST_MODE'; 
    
    document.getElementById('copy-btn').innerText = `🎁 Пригласить класс`;

    // 2. Логика инвайт-ссылки
    function copyCode() {
        const inviteLink = `https://t.me/ru_repetitor_bot?start=teacher_${teacherId}`;
        navigator.clipboard.writeText(inviteLink);
        tg.showAlert(`Ссылка скопирована!\n\nОтправьте её ученикам. Они автоматически привяжутся к вашему классу после перехода и получат бонусные проверки.`);
    }

    // Хранилище инстансов графиков, чтобы не плодить дубликаты
    const charts = {};

    // 3. Загрузка данных
    const WEBHOOK_URL = `https://45.131.183.101.sslip.io/webhook/get-essays?teacher_id=${teacherId}`;

    async function loadData() {
        try {
            const response = await fetch(WEBHOOK_URL);
            if (!response.ok) throw new Error('Network response was not ok');
            const data = await response.json();
            
            document.getElementById('loader').style.display = 'none';
            document.getElementById('dashboard-content').classList.remove('hidden');
            
            // Поддержка обеих структур ответа n8n
            const rawWorks = data.works || data || []; 
            processAndRender(rawWorks);

            const now = new Date();
            document.getElementById('last-update').innerText = `Синхронизировано: ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
        } catch (error) {
            console.error('Ошибка загрузки:', error);
            document.getElementById('loader').innerText = '⚠️ Ошибка подключения к базе. Попробуйте перезапустить Mini App.';
        }
    }

    // 4. Ядро обработки и рендера
    function processAndRender(works) {
        if (!works || works.length === 0) {
            document.getElementById('students-list').innerHTML = `
                <div class="bg-gray-800 border border-gray-700 rounded-xl p-8 text-center text-gray-400">
                    <div class="text-4xl mb-3">📭</div>
                    <h3 class="text-white font-bold mb-2">Работ пока нет</h3>
                    <p class="text-sm">Нажмите «Пригласить класс» и отправьте ссылку ученикам.</p>
                </div>`;
            return;
        }

        const studentsMap = {};
        const classCriteriaStats = {};
        let totalScoreSum = 0;

        // АГРЕГАЦИЯ
        works.forEach(w => {
            // Нормализация данных (защита от разных ключей JSON)
            const name = w.student_name || w.studentName || 'Неизвестный';
            const cid = w.chat_id || name;
            const score = Number(w.total_score ?? w.totalScore ?? 0);
            const exam = (w.exam_type || w.examType || 'Экзамен').toUpperCase();
            
            // Парсинг JSON критериев (если они пришли строкой)
            let criteria = w.criteria || w.report_json?.criteria_breakdown || {};
            if (typeof criteria === 'string') {
                try { criteria = JSON.parse(criteria); } catch(e) { criteria = {}; }
            }

            let errors = w.report_json?.errors_list || [];
            if (w.aiComment) errors = [w.aiComment]; // Фолбэк на старую логику

            // Группировка учеников
            if (!studentsMap[cid]) {
                studentsMap[cid] = { name, exam, works: [] };
            }
            studentsMap[cid].works.push({ score, criteria, errors });
            totalScoreSum += score;

            // Сбор статы для тепловой карты
            for (let [crit, val] of Object.entries(criteria)) {
                if (!classCriteriaStats[crit]) classCriteriaStats[crit] = { total: 0, count: 0 };
                classCriteriaStats[crit].total += Number(val);
                classCriteriaStats[crit].count += 1;
            }
        });

        const studentsCount = Object.keys(studentsMap).length;
        const avgScore = totalScoreSum / works.length;

        // Обновляем верхние метрики
        document.getElementById('stat-total').innerText = works.length;
        document.getElementById('stat-students').innerText = studentsCount;
        document.getElementById('stat-avg').innerText = avgScore.toFixed(1);

        // РЕНДЕР ТЕПЛОВОЙ КАРТЫ (Топ-3 проблемных)
        const heatmapContainer = document.getElementById('class-heatmap');
        heatmapContainer.innerHTML = ''; 
        
        const weakPoints = Object.entries(classCriteriaStats)
            .map(([crit, data]) => ({ crit, avg: (data.total / data.count).toFixed(2) }))
            .sort((a, b) => a.avg - b.avg) // Сортируем по возрастанию балла
            .slice(0, 3); // Берем 3 самых плохих

        weakPoints.forEach(wp => {
            heatmapContainer.innerHTML += `
                <div class="bg-red-900/20 border border-red-500/30 rounded-lg p-3 text-center">
                    <div class="text-red-400 font-bold text-lg">${wp.crit}</div>
                    <div class="text-gray-400 text-[10px] uppercase">Ср. балл: <span class="text-gray-200">${wp.avg}</span></div>
                </div>
            `;
        });

        // РЕНДЕР КАРТОЧЕК УЧЕНИКОВ
        const list = document.getElementById('students-list');
        list.innerHTML = '';

        Object.entries(studentsMap).forEach(([cid, student], index) => {
            const latestWork = student.works[0]; // Предполагаем, что последняя сдача первая в массиве (или нужно отсортировать)
            // Разворачиваем для графика (хронология: старые -> новые)
            const chronologicalWorks = [...student.works].reverse();
            const scoresForChart = chronologicalWorks.map(w => w.score);
            const labelsForChart = chronologicalWorks.map((w, i) => `#${i+1}`);

            const card = document.createElement('div');
            card.className = 'bg-gray-800 rounded-xl overflow-hidden border border-gray-700 shadow-sm';
            
            // Цвет бейджа последней оценки
            const scoreColor = latestWork.score > 15 ? 'text-green-400 bg-green-400/10' : (latestWork.score > 10 ? 'text-yellow-400 bg-yellow-400/10' : 'text-red-400 bg-red-400/10');

            card.innerHTML = `
                <div class="p-4 flex justify-between items-center cursor-pointer hover:bg-gray-750 transition-colors" onclick="toggleDetails('${cid}', ${index})">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-blue-500/20 text-blue-400 flex items-center justify-center font-bold text-lg">
                            ${student.name.charAt(0)}
                        </div>
                        <div>
                            <h3 class="text-white font-semibold">${student.name}</h3>
                            <p class="text-xs text-gray-400">${student.exam} • Сдано работ: ${student.works.length}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-[10px] text-gray-400 uppercase tracking-wider mb-1">Последняя</div>
                        <div class="text-lg font-bold px-2 py-0.5 rounded-md ${scoreColor}">
                            ${latestWork.score} б.
                        </div>
                    </div>
                </div>

                <div id="details-${cid}" class="hidden border-t border-gray-700 bg-gray-900/50 p-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="bg-gray-800 border border-gray-700 rounded-lg p-2 h-48 relative">
                            <canvas id="chart-${cid}"></canvas>
                        </div>
                        
                        <div class="h-48 overflow-y-auto pr-2 space-y-2">
                            ${student.works.map((w, i) => {
                                const errPreview = w.errors.length > 0 ? w.errors[0].substring(0, 50) + '...' : 'Ошибок не найдено ✅';
                                return `
                                <div class="bg-gray-800 p-3 rounded-lg border-l-2 ${w.score > 15 ? 'border-green-500' : 'border-red-500'} flex justify-between items-center gap-2">
                                    <div class="text-xs text-gray-300 truncate w-full">${errPreview}</div>
                                    <div class="text-sm font-bold text-white whitespace-nowrap">${w.score} б.</div>
                                </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                </div>
            `;
            list.appendChild(card);

            // Инициализация графика (Сохраняем функцию в глобальный объект для вызова при открытии)
            charts[cid] = {
                initialized: false,
                labels: labelsForChart,
                data: scoresForChart
            };
        });
    }

    // 5. Логика аккордеона и ленивой загрузки графиков
    function toggleDetails(cid, index) {
        const el = document.getElementById(`details-${cid}`);
        el.classList.toggle('hidden');

        // Рисуем график только когда плашка открывается первый раз
        if (!el.classList.contains('hidden') && charts[cid] && !charts[cid].initialized) {
            const ctx = document.getElementById(`chart-${cid}`).getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: charts[cid].labels,
                    datasets: [{
                        label: 'Баллы',
                        data: charts[cid].data,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        borderWidth: 2,
                        pointBackgroundColor: '#60a5fa',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#374151' }, ticks: { color: '#9ca3af', stepSize: 5 } },
                        x: { grid: { display: false }, ticks: { color: '#9ca3af' } }
                    }
                }
            });
            charts[cid].initialized = true;
        }
    }

    // Запуск
    window.onload = () => {
        loadData();
        setInterval(loadData, 15000); // Автообновление каждые 15 сек
    };
</script>

</body>
</html>
