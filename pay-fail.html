<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Оплата не завершена — ПРОВЕРЯЙ</title>
  <meta name="robots" content="noindex">
  <style>
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f6f7fb;color:#111827}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{max-width:560px;background:white;border-radius:24px;padding:28px;box-shadow:0 18px 60px rgba(15,23,42,.12)}
    .icon{width:56px;height:56px;border-radius:18px;background:#fee2e2;display:flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:18px}
    h1{font-size:26px;line-height:1.15;margin:0 0 12px}
    p{font-size:16px;line-height:1.55;color:#374151;margin:0 0 14px}
    .note{font-size:14px;color:#6b7280;background:#f9fafb;border-radius:16px;padding:14px;margin-top:16px}
    .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}
    a{display:inline-flex;align-items:center;justify-content:center;border-radius:14px;padding:12px 16px;text-decoration:none;font-weight:700}
    .primary{background:#111827;color:white}
    .secondary{background:#eef2ff;color:#3730a3}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="icon">!</div>
      <h1>Оплата не завершена</h1>
      <p>Платёж был отменён, отклонён банком или не был завершён на платёжной форме.</p>
      <p>Проверки не начислены. Можно попробовать ещё раз из личного кабинета.</p>
      <div class="note">Если деньги всё-таки списались, напишите в поддержку в Telegram-боте — проверим платёж вручную.</div>
      <div class="btns">
        <a class="primary" href="https://proveryay.ru/">Вернуться в кабинет</a>
        <a class="secondary" href="https://t.me/ru_repetitor_bot?start=support">Поддержка</a>
      </div>
    </section>
  </main>
</body>
</html>
